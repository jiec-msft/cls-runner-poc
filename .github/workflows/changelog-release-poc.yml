---
name: Changelog Release POC

on:
  workflow_dispatch:
    inputs:
      release_kind:
        description: 'Release-note source: nightly uses Unreleased; release uses the base version'
        type: choice
        required: true
        default: release
        options:
          - nightly
          - release
      release_version:
        description: 'Release version or nightly baseline, for example 1.14.0-rc.1 or 1.14.0'
        type: string
        required: true
        default: '1.14.0-rc.1'
      marketplace_channel:
        description: 'JetBrains Marketplace channel'
        type: choice
        required: true
        default: nightly
        options:
          - nightly
          - stable
      visibility:
        description: 'Publish as hidden or visible'
        type: choice
        required: true
        default: hidden
        options:
          - hidden
          - visible
      build_mode:
        description: 'split builds the fat + 6 slim plugins; universal builds one legacy plugin'
        type: choice
        required: true
        default: split
        options:
          - split
          - universal
      plugin_id:
        description: 'Numeric Marketplace plugin id'
        type: string
        required: false
        default: '32412'
      dry_run:
        description: 'Build only; skip Marketplace upload'
        type: boolean
        required: false
        default: true
      publish_github_release:
        description: 'Create or overwrite a POC GitHub Release body'
        type: boolean
        required: false
        default: false
      github_release_tag:
        description: 'Optional changelog-poc-* tag; defaults to changelog-poc-v<computed version>'
        type: string
        required: false
        default: ''
  # Mirror jb release.yml, which auto-runs on a published GitHub Release
  # (jb uses `types: [released]`). The POC marks its test tags as prereleases,
  # so we also listen to `prereleased` to exercise the same auto-trigger path.
  release:
    types: [released, prereleased]

permissions:
  contents: write

jobs:
  build-and-publish:
    name: Build and publish release-note POC
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Test release-note helper
        run: node --test .github/workflows/scripts/release-notes/release-notes.test.mjs

      - name: Resolve release context
        id: ctx
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          IN_KIND: ${{ inputs.release_kind }}
          IN_VERSION: ${{ inputs.release_version }}
          IN_CHANNEL: ${{ inputs.marketplace_channel }}
          IN_VISIBILITY: ${{ inputs.visibility }}
          IN_BUILD_MODE: ${{ inputs.build_mode }}
          IN_PLUGIN_ID: ${{ inputs.plugin_id }}
          IN_DRY_RUN: ${{ inputs.dry_run }}
          IN_PUBLISH_RELEASE: ${{ inputs.publish_github_release }}
          IN_RELEASE_TAG: ${{ inputs.github_release_tag }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "release" ]; then
            # Mirror jb: a published GitHub release is always a stable/RC "release" build.
            # POC tags look like `changelog-poc-v<version>`; jb uses plain `v<version>`.
            VERSION="${RELEASE_TAG#changelog-poc-}"
            VERSION="${VERSION#v}"
            {
              echo "release_kind=release"
              echo "release_version=$VERSION"
              echo "marketplace_channel=nightly"
              echo "visibility=hidden"
              echo "build_mode=split"
              echo "plugin_id=32412"
              echo "dry_run=true"
              echo "publish_github_release=false"
              echo "update_triggering_release=true"
              echo "release_tag=$RELEASE_TAG"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "release_kind=$IN_KIND"
              echo "release_version=$IN_VERSION"
              echo "marketplace_channel=$IN_CHANNEL"
              echo "visibility=$IN_VISIBILITY"
              echo "build_mode=$IN_BUILD_MODE"
              echo "plugin_id=$IN_PLUGIN_ID"
              echo "dry_run=$IN_DRY_RUN"
              echo "publish_github_release=$IN_PUBLISH_RELEASE"
              echo "update_triggering_release=false"
              echo "release_tag=$IN_RELEASE_TAG"
            } >> "$GITHUB_OUTPUT"
          fi
          echo "Event: $EVENT_NAME"

      - name: Resolve plugin version
        id: release
        shell: bash
        env:
          RELEASE_KIND: ${{ steps.ctx.outputs.release_kind }}
          RELEASE_VERSION: ${{ steps.ctx.outputs.release_version }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          RELEASE_VERSION="${RELEASE_VERSION#v}"

          if [ "$RELEASE_KIND" = "nightly" ]; then
            IFS=. read -r MAJOR MINOR PATCH_WITH_SUFFIX <<< "$RELEASE_VERSION"
            PATCH="${PATCH_WITH_SUFFIX%%-*}"
            CORE="${MAJOR}.${MINOR}.$((PATCH + 1))-nightly.${RUN_NUMBER}"
          else
            CORE="$RELEASE_VERSION"
          fi

          echo "core=$CORE" >> "$GITHUB_OUTPUT"
          echo "Plugin version: $CORE"

      - name: Prepare release notes
        id: release_notes
        uses: ./.github/actions/prepare-release-notes
        with:
          releaseKind: ${{ steps.ctx.outputs.release_kind }}
          releaseVersion: ${{ steps.ctx.outputs.release_version }}
          pluginVersion: ${{ steps.release.outputs.core }}
          repository: ${{ github.repository }}
          commit: ${{ github.sha }}
          serverUrl: ${{ github.server_url }}

      - name: Upload Release body transfer artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: build/release-notes/
          if-no-files-found: error
          retention-days: 1

      - name: Download CLS binaries
        shell: pwsh
        run: ./scripts/download-binaries.ps1

      - name: Build plugin ZIPs
        shell: bash
        env:
          CORE: ${{ steps.release.outputs.core }}
          SECTION: ${{ steps.release_notes.outputs.section }}
          BUILD_MODE: ${{ steps.ctx.outputs.build_mode }}
        run: |
          set -euo pipefail
          GRADLE_PROPERTIES=("-PpocBaseVersion=$CORE")
          if [ "$SECTION" != "Unreleased" ]; then
            GRADLE_PROPERTIES+=("-PreleaseNotesVersion=$SECTION")
          fi

          if [ "$BUILD_MODE" = "universal" ]; then
            ./gradlew "${GRADLE_PROPERTIES[@]}" buildPlugin \
              -PuniversalBuild=true \
              --no-daemon \
              --console=plain
          else
            ./gradlew "${GRADLE_PROPERTIES[@]}" buildNativePlugins \
              --no-daemon \
              --console=plain
          fi

      - name: Verify generated change notes
        shell: bash
        run: |
          set -euo pipefail
          PLUGIN_XML=build/tmp/patchPluginXml/plugin.xml
          grep -F '<change-notes>' "$PLUGIN_XML"
          grep -F '<h3>' "$PLUGIN_XML"

      - name: Create or overwrite POC GitHub Release
        if: ${{ steps.ctx.outputs.publish_github_release == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CORE: ${{ steps.release.outputs.core }}
          INPUT_TAG: ${{ steps.ctx.outputs.release_tag }}
        run: |
          set -euo pipefail
          COMMIT=$(git rev-parse HEAD)
          TAG="${INPUT_TAG:-changelog-poc-v${CORE}}"
          if [[ "$TAG" != changelog-poc-* ]]; then
            echo "POC release tags must start with changelog-poc-"
            exit 1
          fi

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            TAG_COMMIT=$(gh api "repos/$GITHUB_REPOSITORY/commits/$TAG" --jq .sha)
            if [ "$TAG_COMMIT" != "$COMMIT" ]; then
              echo "Existing tag $TAG points to $TAG_COMMIT, expected $COMMIT"
              exit 1
            fi
            gh release edit "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Release notes POC $CORE" \
              --notes-file "${{ steps.release_notes.outputs.release_body_path }}" \
              --prerelease
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$COMMIT" \
              --title "Release notes POC $CORE" \
              --notes-file "${{ steps.release_notes.outputs.release_body_path }}" \
              --prerelease
          fi

      # Mirror jb's `update-release-notes` job: when the run was triggered by a
      # published release, overwrite THAT release's body with the generated notes.
      - name: Overwrite triggering release body
        if: ${{ steps.ctx.outputs.update_triggering_release == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.ctx.outputs.release_tag }}
          BODY_PATH: ${{ steps.release_notes.outputs.release_body_path }}
        run: |
          set -euo pipefail
          if [[ "$RELEASE_TAG" != changelog-poc-* ]]; then
            echo "Release $RELEASE_TAG is not a changelog-poc-* tag; skipping body overwrite."
            exit 0
          fi
          gh release edit "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --notes-file "$BODY_PATH"

      - name: Publish hidden plugin to JetBrains Marketplace
        if: ${{ steps.ctx.outputs.dry_run != 'true' }}
        uses: ./.github/actions/publish-to-marketplace
        with:
          marketplaceToken: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
          channel: ${{ steps.ctx.outputs.marketplace_channel }}
          hidden: ${{ steps.ctx.outputs.visibility == 'hidden' && 'true' || 'false' }}
          pluginId: ${{ steps.ctx.outputs.plugin_id }}

      - name: Upload POC artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: changelog-release-poc-${{ steps.release.outputs.core }}
          path: |
            build/distributions/cls-runner-*.zip
            build/native-distributions/cls-runner-*.zip
            build/release-notes/
            build/tmp/patchPluginXml/plugin.xml
          if-no-files-found: warn
          retention-days: 7

  verify-release-notes-transfer:
    name: Verify release-note artifact transfer
    needs: build-and-publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download Release body
        uses: actions/download-artifact@v8
        with:
          name: release-notes
          path: release-notes

      - name: Verify stable extracted path
        run: |
          test -f release-notes/release-body.md
          test -f release-notes/release-notes.md
