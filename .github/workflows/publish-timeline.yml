---
name: Publish timeline (v1..v9)

# Publishes the full split-plugin lifecycle (TEST-SCENARIOS.md §2) to JetBrains Marketplace in one
# dispatch: v1..v3 universal, v4..v5 split, v6..v7 universal (rollback), v8..v9 split (re-adopt).
#
# One job builds every step in order (binaries downloaded once, gradle daemon reused) and uploads
# each step's ZIPs before moving on, so a watcher can observe each migration as it lands. Use `up_to`
# to publish only a prefix of the timeline (e.g. up_to=4 to stop right after introducing the split).
#
# The very FIRST version of a brand-new plugin must be created once via the web UI; 32412 already
# exists, so this workflow (keyed by the numeric plugin_id) handles every version.

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Marketplace channel'
        type: choice
        required: true
        default: nightly
        options: [nightly, stable]
      visibility:
        description: 'hidden = approved but not publicly listed'
        type: choice
        required: true
        default: hidden
        options: [hidden, visible]
      up_to:
        description: 'Publish steps v1..vN (1..9)'
        type: choice
        required: true
        default: '9'
        options: ['1', '2', '3', '4', '5', '6', '7', '8', '9']
      plugin_id:
        description: 'Numeric Marketplace plugin id'
        type: string
        required: false
        default: '32412'
      dry_run:
        description: 'Build only — skip all uploads'
        type: boolean
        required: false
        default: true

permissions:
  contents: read

jobs:
  publish-timeline:
    name: "Publish v1..v${{ inputs.up_to }} (${{ inputs.channel }})"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node (for npm pack of CLS binaries)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache CLS binaries (all 6 platforms)
        uses: actions/cache@v4
        with:
          path: copilot-agent/native
          key: cls-binaries-1.509.0

      - name: Download CLS binaries (all 6 platforms)
        shell: pwsh
        run: ./scripts/download-binaries.ps1

      - name: Build + publish the timeline
        shell: bash
        env:
          CHANNEL: ${{ inputs.channel }}
          VISIBILITY: ${{ inputs.visibility }}
          UP_TO: ${{ inputs.up_to }}
          PLUGIN_ID: ${{ inputs.plugin_id }}
          DRY_RUN: ${{ inputs.dry_run }}
          RUN_NUMBER: ${{ github.run_number }}
          MARKETPLACE_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
        run: |
          set -uo pipefail
          chmod +x ./gradlew

          # v -> stable core : mode. Major bumps keep the core strictly monotonic across the whole
          # timeline, so any later step updates any earlier one within a compatible IDE.
          STEPS=(
            "1:2.0.0:universal" "2:3.0.0:universal" "3:4.0.0:universal"
            "4:5.0.0:split"     "5:6.0.0:split"
            "6:7.0.0:universal" "7:8.0.0:universal"
            "8:9.0.0:split"     "9:10.0.0:split"
          )

          HIDDEN_OPTS=(); [ "$VISIBILITY" = "hidden" ] && HIDDEN_OPTS=(-F "isHidden=true")

          # Upload one ZIP with retry + idempotency (mirrors .github/actions/publish-to-marketplace).
          publish_one() {
            local file="$1" mb; mb=$(( $(stat -c%s "$file") / 1024 / 1024 ))
            for attempt in $(seq 1 10); do
              echo "    [$(basename "$file") ${mb}MB] attempt $attempt/10"
              local tmp code body; tmp=$(mktemp)
              code=$(curl -w "%{http_code}" -s -o "$tmp" \
                --header "Authorization: Bearer $MARKETPLACE_TOKEN" \
                -F "pluginId=$PLUGIN_ID" -F "file=@${file}" -F "channel=${CHANNEL}" \
                "${HIDDEN_OPTS[@]}" \
                https://plugins.jetbrains.com/plugin/uploadPlugin)
              body=$(cat "$tmp"); rm -f "$tmp"
              echo "      HTTP $code"
              [ "$code" = "201" ] && { echo "      ✅ published"; return 0; }
              if [ "$code" = "400" ] && echo "$body" | grep -qi "already contains version"; then
                echo "      ✅ already exists"; return 0; fi
              echo "      response: $body"
              # A 400 "Out of memory" is a TRANSIENT Marketplace server condition on the large-upload
              # (362MB fat) path — observed intermittently on identical zips — so retry it. os/arch
              # slims now publish for 3rd-party ids (feature enabled); any OTHER 4xx is a real client
              # error and fails.
              if [ "$code" = "400" ] && echo "$body" | grep -qi "out of memory"; then
                echo "      ⚠️ transient server OOM — will retry"
              elif [ "$code" -ge 400 ] && [ "$code" -lt 500 ]; then
                echo "      ❌ client error"; return 1
              fi
              [ "$attempt" -lt 10 ] && { echo "      ⏳ retry in 30s"; sleep 30; }
            done
            return 1
          }

          FAIL=0
          for s in "${STEPS[@]}"; do
            IFS=: read -r v core mode <<< "$s"
            [ "$v" -le "$UP_TO" ] || continue

            if [ "$CHANNEL" = "nightly" ]; then
              MAJOR=${core%%.*}; REST=${core#*.}; MINOR=${REST%%.*}; PATCH=${REST#*.}
              CORE="${MAJOR}.${MINOR}.$((PATCH + 1))-nightly.${RUN_NUMBER}"
            else
              CORE="$core"
            fi

            echo "::group::v$v  $CORE  ($mode)"
            rm -f build/distributions/cls-runner-*.zip build/native-distributions/cls-runner-*.zip
            if [ "$mode" = "universal" ]; then
              ./gradlew buildPlugin -PuniversalBuild=true -PpocBaseVersion="$CORE" --no-daemon --console=plain
            else
              ./gradlew buildNativePlugins -PpocBaseVersion="$CORE" --no-daemon --console=plain
            fi

            mapfile -t ZIPS < <(find build -name "cls-runner-${CORE}-*.zip" -type f | sort)
            echo "built ${#ZIPS[@]} ZIP(s): $(printf '%s ' "${ZIPS[@]##*/}")"

            if [ "$DRY_RUN" = "true" ]; then
              echo "dry_run — skipping upload"
            else
              for z in "${ZIPS[@]}"; do rc=0; publish_one "$z" || rc=$?; [ "$rc" -ne 0 ] && FAIL=1; done
            fi
            echo "::endgroup::"
          done

          [ "$FAIL" -eq 0 ] || { echo "❌ one or more uploads failed"; exit 1; }
          echo "✅ timeline v1..v$UP_TO done (channel=$CHANNEL, dry_run=$DRY_RUN)"
